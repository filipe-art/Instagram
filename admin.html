<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Painel Secreto</title>
    <style>
        body { font-family: 'Courier New', monospace; background: #1a1a1a; color: #00ff00; padding: 50px; }
        .painel { border: 1px solid #333; padding: 20px; background: #000; max-width: 400px; }
        b { color: #ff00ff; }
    </style>
</head>
<body>

<div class="painel">
    <h2>🕵️ DADOS RECUPERADOS</h2>
    <p>Último Usuário: <b id="resUser">Nenhum</b></p>
    <p>Última Senha: <b id="resPass">Nenhuma</b></p>
    <button onclick="localStorage.clear(); location.reload();">Limpar Registro</button>
</div>

<script>
    // Recupera o que está escondido no LocalStorage
    document.getElementById('resUser').innerText = localStorage.getItem('user_capturado') || "Vazio";
    document.getElementById('resPass').innerText = localStorage.getItem('pass_capturado') || "Vazio";
</script>

</body>
</html>
